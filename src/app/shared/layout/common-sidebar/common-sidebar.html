<section
  #sidebar
  class="flex flex-col fixed right-0 top-0 h-screen w-screen md:max-w-xs bg-emerald-900 shadow-xl transform translate-x-0 opacity-100 animate-[slideIn_0.3s_ease-out] will-change-transform overflow-y-auto"
>
  <div class="flex items-center justify-end px-4 h-16 border-b border-emerald-700">
    <app-close-icon-svg (click)="closeSidebar(sidebar)" class="size-4 text-white cursor-pointer" />
  </div>

  <div class="flex flex-col py-2">
    @for (item of menuItems; track item.route) {
    <button
      #rla="routerLinkActive"
      [routerLink]="item.route"
      routerLinkActive="bg-emerald-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="p-4 text-left text-white font-medium cursor-pointer outline-none focus:outline-none"
      [class.hover:bg-emerald-800]="!rla.isActive"
      (click)="closeSidebar(sidebar)"
    >
      {{ item.label }}
    </button>
    }
  </div>
</section>
