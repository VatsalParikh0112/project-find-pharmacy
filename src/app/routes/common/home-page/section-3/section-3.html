<section class="flex flex-col pb-8 px-2 lg:px-8 gap-4">
  <div class="flex flex-col gap-2">
    <span class="text-emerald-500">Process</span>
    <span class="font-semibold text-xl">Follow These Simple Steps to Find Pharmacies</span>
    <span class="text-sm opacity-70 leading-relaxed max-w-5xl">
      Finding a pharmacy with your medicine is easy! Enter the details and zip code to get matched
      with nearby stocked pharmacies.
    </span>
  </div>

  <div class="flex flex-col gap-4">
    @for (step of steps; track $index) {
    <div class="flex flex-col">
      <div class="bg-neutral-400 h-102 rounded-lg"></div>

      <div class="flex text-sm flex-col gap-2 p-2">
        <span class="font-bold"> {{ step.title }} </span>

        <div class="flex flex-col">
          <span class="opacity-70"> {{ step.desc1 }} </span>
          <span class="opacity-70"> {{ step.desc2 }} </span>
        </div>
      </div>
    </div>
    }
  </div>
</section>
